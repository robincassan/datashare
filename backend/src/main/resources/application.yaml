spring:
  application:
    name: datashare-backend
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
  datasource:
    url: jdbc:postgresql://localhost:5432/datashare
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  pattern:
    console: "{\"timestamp\":\"%d{ISO8601}\",\"level\":\"%p\",\"logger\":\"%c\",\"message\":\"%m\"}%n"
  level:
    com.datashare: DEBUG
    org.springframework.web: INFO

server:
  port: 8080

app:
  jwt:
    secret: "maCleSecretePourGenererLesTokensJWT128bitsMinimum"
    expiration: 86400000
