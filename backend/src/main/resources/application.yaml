spring:
  application:
    name: datashare-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/datashare
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080

app:
  jwt:
    secret: "maCleSecretePourGenererLesTokensJWT128bitsMinimum"
    expiration: 86400000
