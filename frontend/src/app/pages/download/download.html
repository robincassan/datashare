  <div class="container">
    <h2>Téléchargement</h2>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    @if (fileInfo) {
      <div class="file-info">
        <h3>{{ fileInfo.fileName }}</h3>
        <p>Taille : {{ fileInfo.fileSize }} octets</p>
        <p>Expire le : {{ fileInfo.expiresAt }}</p>

        @if (passwordRequired) {
          <div>
            <input type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe requis">
          </div>
        }

        <button (click)="download()">Télécharger</button>
      </div>
    } @else {
      <p>Chargement...</p>
    }
  </div>
