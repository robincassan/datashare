  <div class="container">
    <h2>Inscription</h2>
    <form (ngSubmit)="register()">
      <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe (min 8 car.)" required>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirmer le mot de passe" required>
      <button type="submit">Créer mon compte</button>
      <p class="error">{{ error }}</p>
      <a routerLink="/login">Déjà un compte ?</a>
    </form>
  </div>
